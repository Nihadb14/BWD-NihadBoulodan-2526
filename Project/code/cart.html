<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winkelkar - ByteForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <!-- 🔝 NAVBAR -->
  <nav class="bg-gray-800 p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold text-blue-500">ByteForge</h1>

      <div class="space-x-4">
        <a href="index.html" class="hover:text-blue-400">Home</a>
        <a href="products.html" class="hover:text-blue-400">Producten</a>
        <a href="contact.html" class="hover:text-blue-400">Contact</a>
        <a href="cart.html" class="text-blue-400">Winkelkar</a>
      </div>
    </div>
  </nav>

  <!-- 🛒 TITEL -->
  <section class="text-center py-12">
    <h2 class="text-4xl font-bold">Jouw winkelkar</h2>
  </section>

  <!-- 📦 PRODUCTEN IN WINKELKAR -->
  <section class="max-w-4xl mx-auto px-4 space-y-4">

    <!-- ITEM -->
    <div class="bg-gray-800 p-4 rounded flex justify-between items-center">
      <div>
        <h3 class="font-bold">Gaming Beast</h3>
        <p class="text-gray-400 text-sm">€1299</p>
      </div>
      <button class="text-red-400">Verwijder</button>
    </div>

    <!-- ITEM -->
    <div class="bg-gray-800 p-4 rounded flex justify-between items-center">
      <div>
        <h3 class="font-bold">SSD 1TB</h3>
        <p class="text-gray-400 text-sm">€120</p>
      </div>
      <button class="text-red-400">Verwijder</button>
    </div>

    <!-- ITEM -->
    <div class="bg-gray-800 p-4 rounded flex justify-between items-center">
      <div>
        <h3 class="font-bold">RAM 16GB</h3>
        <p class="text-gray-400 text-sm">€80</p>
      </div>
      <button class="text-red-400">Verwijder</button>
    </div>

  </section>

  <!-- 💰 SAMENVATTING -->
  <section class="max-w-4xl mx-auto px-4 mt-10 bg-gray-800 p-6 rounded">

    <h3 class="text-2xl font-bold mb-4">Overzicht</h3>

    <p>Subtotaal: €1499</p>
    <p>BTW: €314</p>
    <p class="font-bold text-blue-400 text-lg mt-2">Totaal: €1813</p>

    <button class="mt-6 w-full bg-blue-500 py-3 rounded hover:bg-blue-600">
      Bestelling plaatsen
    </button>

  </section>

  <!-- 🔻 FOOTER -->
  <footer class="bg-gray-800 text-center p-4 mt-10 text-gray-400">
    © 2026 ByteForge
  </footer>

</body>
</html>
